<svg xmlns="http://www.w3.org/2000/svg" width="920" height="1280" viewBox="0 0 920 1280">
<rect width="100%" height="100%" fill="white"/>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
  </defs>

<text x="460.0" y="28" text-anchor="middle" font-family="system-ui,sans-serif" font-size="17" font-weight="bold" fill="#111">Earth Monitor — end-to-end</text>
<text x="620" y="52" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#111">Legend</text>
<rect x="620" y="70" width="14" height="14" rx="8" ry="8" fill="#e8f4fc" stroke="#333" stroke-width="1.5"/>
<text x="642" y="82" font-family="system-ui,sans-serif" font-size="11" fill="#111">User machine (not in Compose)</text>
<rect x="620" y="96" width="14" height="14" rx="8" ry="8" fill="#d4edda" stroke="#333" stroke-width="1.5"/>
<text x="642" y="108" font-family="system-ui,sans-serif" font-size="11" fill="#111">Docker Compose service</text>
<rect x="620" y="122" width="14" height="14" rx="8" ry="8" fill="#fff3cd" stroke="#333" stroke-width="1.5"/>
<text x="642" y="134" font-family="system-ui,sans-serif" font-size="11" fill="#111">External API (internet)</text>
<rect x="620" y="148" width="14" height="14" rx="8" ry="8" fill="#e2d5f1" stroke="#333" stroke-width="1.5"/>
<text x="642" y="160" font-family="system-ui,sans-serif" font-size="11" fill="#111">Persistent volume / DB</text>
<rect x="280" y="40" width="360" height="100" rx="8" ry="8" fill="#e8f4fc" stroke="#333" stroke-width="1.5"/>
<text x="460.0" y="62" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="10" font-weight="bold" fill="#111">
<tspan x="460.0" dy="0">User (browser)</tspan>
<tspan x="460.0" dy="14">INPUT: search text, location names for hotspots</tspan>
<tspan x="460.0" dy="14">OUTPUT: scenes, image URLs, alertCount, alertType</tspan>
</text>
<rect x="280" y="160" width="360" height="72" rx="8" ry="8" fill="#d4edda" stroke="#333" stroke-width="1.5"/>
<text x="460.0" y="182" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="10" font-weight="bold" fill="#111">
<tspan x="460.0" dy="0">Container: web (Angular) :80</tspan>
<tspan x="460.0" dy="14">STORES: static assets in image only</tspan>
</text>
<rect x="280" y="250" width="360" height="100" rx="8" ry="8" fill="#d4edda" stroke="#333" stroke-width="1.5"/>
<text x="460.0" y="272" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="10" font-weight="bold" fill="#111">
<tspan x="460.0" dy="0">Container: server (Node + Apollo) :4000</tspan>
<tspan x="460.0" dy="14">INPUT: POST /graphql + query/variables</tspan>
<tspan x="460.0" dy="14">OUTPUT: GraphQL JSON</tspan>
<tspan x="460.0" dy="14">STORES: none (proxy)</tspan>
</text>
<rect x="220" y="370" width="480" height="150" rx="8" ry="8" fill="#d4edda" stroke="#333" stroke-width="1.5"/>
<text x="460.0" y="392" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="10" font-weight="bold" fill="#111">
<tspan x="460.0" dy="0">Container: copernicus (FastAPI + PyTorch) :5001</tspan>
<tspan x="460.0" dy="14">INPUT: GET /search, GET /hotspots from Node</tspan>
<tspan x="460.0" dy="14">OUTPUT: JSON scenes + hotspots (predict_alert)</tspan>
<tspan x="460.0" dy="14">STORES: none; env COPERNICUS_*, HUGGINGFACE_TOKEN</tspan>
</text>
<rect x="30" y="560" width="250" height="120" rx="8" ry="8" fill="#fff3cd" stroke="#333" stroke-width="1.5"/>
<text x="155.0" y="582" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="10" font-weight="bold" fill="#111">
<tspan x="155.0" dy="0">Copernicus Data Space</tspan>
<tspan x="155.0" dy="14">INPUT: OAuth + query</tspan>
<tspan x="155.0" dy="14">OUTPUT: Sentinel-2 metadata/tiles</tspan>
</text>
<rect x="335" y="560" width="250" height="120" rx="8" ry="8" fill="#fff3cd" stroke="#333" stroke-width="1.5"/>
<text x="460.0" y="582" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="10" font-weight="bold" fill="#111">
<tspan x="460.0" dy="0">Hugging Face (Mistral)</tspan>
<tspan x="460.0" dy="14">INPUT: prompt</tspan>
<tspan x="460.0" dy="14">OUTPUT: feature/location JSON</tspan>
</text>
<rect x="640" y="560" width="250" height="120" rx="8" ry="8" fill="#fff3cd" stroke="#333" stroke-width="1.5"/>
<text x="765.0" y="582" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="10" font-weight="bold" fill="#111">
<tspan x="765.0" dy="0">Nominatim (OSM)</tspan>
<tspan x="765.0" dy="14">INPUT: place name</tspan>
<tspan x="765.0" dy="14">OUTPUT: bbox, city, country</tspan>
</text>
<rect x="80" y="720" width="760" height="110" rx="8" ry="8" fill="#e2d5f1" stroke="#333" stroke-width="1.5"/>
<text x="460.0" y="742" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="10" font-weight="bold" fill="#111">
<tspan x="460.0" dy="0">Other Compose: OpenSearch :9200, Kafka, Spark</tspan>
<tspan x="460.0" dy="14">STORES: indices/topics in container volumes unless mounted</tspan>
<tspan x="460.0" dy="14">Not on the main browser click path</tspan>
</text>
<rect x="80" y="860" width="760" height="100" rx="8" ry="8" fill="#f0f0f0" stroke="#333" stroke-width="1.5"/>
<text x="460.0" y="882" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="10" font-weight="bold" fill="#111">
<tspan x="460.0" dy="0">Chain</tspan>
<tspan x="460.0" dy="14">Browser → only GraphQL :4000 → HTTP → copernicus :5001</tspan>
<tspan x="460.0" dy="14">→ externals as needed → JSON back</tspan>
</text>
<line x1="460" y1="140" x2="460" y2="158" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
<line x1="460" y1="232" x2="460" y2="248" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
<line x1="460" y1="350" x2="460" y2="368" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
<line x1="460" y1="520" x2="460" y2="558" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
<line x1="360" y1="520" x2="155" y2="600" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
<line x1="460" y1="520" x2="460" y2="600" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
<line x1="560" y1="520" x2="765" y2="600" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
<line x1="460" y1="680" x2="460" y2="716" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
<line x1="460" y1="830" x2="460" y2="856" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>
</svg>